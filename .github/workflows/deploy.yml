name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        # pinned, not `latest`: a floating Bun already broke the build once
        # (the stale-bundle bug fixed by 1.3.14). Bump deliberately.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        # frozen: install exactly the lockfile so the deployed tree can't
        # re-resolve @jax-js/jax and re-nest a second jax under optax (which
        # silently no-ops every optimizer). See the exact-pinned override.
        run: bun install --frozen-lockfile

      # a red commit must not reach the playground – gate the deploy
      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test (language)
        run: bun test ./tests.ts

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Test (browser)
        run: npx playwright test

      - name: Build
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
